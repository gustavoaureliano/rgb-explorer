<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">RGB Explorer Icon</title>
  <desc id="desc">Compact RGB Explorer icon for avatar or favicon use.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E111A"/>
      <stop offset="100%" stop-color="#171D2A"/>
    </linearGradient>

    <linearGradient id="rGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A6A"/>
      <stop offset="100%" stop-color="#E13636"/>
    </linearGradient>

    <linearGradient id="gGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE88D"/>
      <stop offset="100%" stop-color="#1FBF5D"/>
    </linearGradient>

    <linearGradient id="bGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76B7FF"/>
      <stop offset="100%" stop-color="#2C7BFF"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)" stroke="#2B344B" stroke-width="4"/>

  <line x1="44" y1="78" x2="212" y2="78" stroke="#2B344B" stroke-width="3"/>
  <line x1="44" y1="128" x2="212" y2="128" stroke="#2B344B" stroke-width="3"/>
  <line x1="44" y1="178" x2="212" y2="178" stroke="#2B344B" stroke-width="3"/>

  <circle cx="86" cy="78" r="18" fill="url(#rGrad)" filter="url(#glow)"/>
  <circle cx="164" cy="128" r="18" fill="url(#gGrad)" filter="url(#glow)"/>
  <circle cx="122" cy="178" r="18" fill="url(#bGrad)" filter="url(#glow)"/>

  <path d="M86 78 L164 128 L122 178" fill="none" stroke="#D6DEFF" stroke-opacity="0.6" stroke-width="4" stroke-linecap="round"/>

  <rect x="216" y="64" width="12" height="28" rx="6" fill="url(#rGrad)"/>
  <rect x="216" y="114" width="12" height="28" rx="6" fill="url(#gGrad)"/>
  <rect x="216" y="164" width="12" height="28" rx="6" fill="url(#bGrad)"/>
</svg>
